<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Converta.AI — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:#00ffe5;--teal-dim:rgba(0,255,229,.08);--teal-mid:rgba(0,255,229,.18);
  --bg:#020408;--bg2:#060d10;--bg3:#0a1418;
  --border:rgba(0,255,229,.12);--border-bright:rgba(0,255,229,.3);
  --text:#e8f5f2;--text-dim:#6b9e94;--text-muted:rgba(232,245,242,.4);
  --gold:#f0c040;--red:#ff4060;--green:#00e5a0;
  --card:rgba(0,255,229,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.mono{font-family:'Orbitron',monospace}

/* ── GRID BG ── */
body::before{content:'';position:fixed;inset:0;background-image:
  linear-gradient(rgba(0,255,229,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,255,229,.03) 1px,transparent 1px);
  background-size:54px 54px;pointer-events:none;z-index:0}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spin{to{--angle:360deg}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 30px rgba(0,255,229,.08),0 0 60px rgba(0,255,229,.04)}50%{box-shadow:0 0 50px rgba(0,255,229,.18),0 0 100px rgba(0,255,229,.08)}}
.login-card{width:420px;border-radius:16px;background:var(--bg2);padding:48px 40px;position:relative;
  animation:pulse-glow 3s ease-in-out infinite;
  background-clip:padding-box}
.login-card::before{content:'';position:absolute;inset:-2px;border-radius:18px;z-index:-1;
  background:conic-gradient(from var(--angle),transparent 20%,#00ffe5 40%,#00fff0 50%,#00ffe5 60%,transparent 80%);
  animation:spin 4s linear infinite}
.login-card::after{content:'';position:absolute;inset:0px;border-radius:16px;background:var(--bg2);z-index:-1}
.login-logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--teal);letter-spacing:2px;margin-bottom:8px}
.login-logo span{color:rgba(232,245,242,.3)}
.login-sub{font-size:13px;color:var(--text-dim);margin-bottom:36px}
.login-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;display:block}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:16px}
.login-input:focus{border-color:var(--teal)}
.login-btn{width:100%;background:var(--teal);color:var(--bg);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;padding:14px;border:none;border-radius:8px;cursor:pointer;margin-top:8px;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-error{font-size:12px;color:var(--red);margin-top:8px;display:none}


/* ── APP ── */
#app{display:none;min-height:100vh;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:0;z-index:50;display:flex;flex-direction:column}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-text{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--teal);letter-spacing:2px}
.sidebar-logo .logo-text span{color:rgba(232,245,242,.3)}
.sidebar-logo .role-badge{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:4px}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-section{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:12px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-dim);font-size:13px;font-weight:500;transition:all .15s;border-left:2px solid transparent;position:relative}
.nav-item:hover{color:var(--text);background:var(--teal-dim)}
.nav-item.active{color:var(--teal);background:var(--teal-dim);border-left-color:var(--teal)}
.nav-icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--teal-dim);border:1px solid var(--border-bright);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--teal)}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:var(--text-dim)}
.logout-btn{margin-top:10px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ── MAIN ── */
.main{margin-left:240px;min-height:100vh;padding:32px}
.page{display:none}
.page.active{display:block}
.page-header{margin-bottom:28px}
.page-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--teal);letter-spacing:1px}
.page-sub{font-size:13px;color:var(--text-dim);margin-top:4px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:.4}
.stat-val{font-family:'Orbitron',monospace;font-size:28px;font-weight:700;color:var(--teal);line-height:1}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:6px}
.stat-change{font-size:11px;margin-top:4px}
.stat-change.up{color:var(--green)}
.stat-change.down{color:var(--red)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg2);padding:12px 16px;text-align:left;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid rgba(0,255,229,.05);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--teal-dim)}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px}
.badge-green{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid var(--border)}
.badge-red{background:rgba(255,64,96,.1);color:var(--red);border:1px solid rgba(255,64,96,.2)}
.badge-gold{background:rgba(240,192,64,.1);color:var(--gold);border:1px solid rgba(240,192,64,.2)}

/* ── TRANSCRIPT ── */
.transcript-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.transcript-modal.open{opacity:1;pointer-events:all}
.transcript-box{background:var(--bg2);border:1px solid var(--border-bright);border-radius:16px;width:560px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.transcript-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.transcript-title{font-family:'Orbitron',monospace;font-size:14px;color:var(--teal)}
.transcript-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;line-height:1}
.transcript-body{padding:20px 24px;overflow-y:auto;flex:1}
.msg{margin-bottom:14px}
.msg-role{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.msg-role.caller{color:var(--text-dim)}
.msg-role.aria{color:var(--teal)}
.msg-text{font-size:13px;line-height:1.6;background:var(--bg3);padding:10px 14px;border-radius:8px}
.msg.aria-msg .msg-text{border-left:2px solid var(--teal)}

/* ── SETTINGS FORM ── */
.form-group{margin-bottom:20px}
.form-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;display:block}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus,.form-textarea:focus{border-color:var(--teal)}
.form-textarea{resize:vertical;min-height:100px;line-height:1.6}
.form-select{cursor:pointer}
.faq-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.faq-item input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.faq-item input:focus{border-color:var(--teal)}
.faq-remove{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;padding:6px;line-height:1;transition:color .15s}
.faq-remove:hover{color:var(--red)}
.add-faq-btn{background:var(--teal-dim);border:1px solid var(--border);color:var(--teal);padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.add-faq-btn:hover{background:var(--teal-mid)}
.save-btn{background:var(--teal);color:var(--bg);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1.5px;padding:12px 28px;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s}
.save-btn:hover{opacity:.9}
.save-success{font-size:12px;color:var(--green);margin-left:12px;display:none}

/* ── ADMIN CLIENT LIST ── */
.client-row{display:grid;grid-template-columns:1fr 120px 100px 80px;gap:16px;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(0,255,229,.05);cursor:pointer;transition:background .15s}
.client-row:hover{background:var(--teal-dim)}
.client-row:last-child{border-bottom:none}
.client-name{font-weight:500;font-size:14px}
.client-industry{font-size:12px;color:var(--text-dim);margin-top:2px}
.client-row-header{display:grid;grid-template-columns:1fr 120px 100px 80px;gap:16px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.col-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim)}

/* ── BILLING ── */
.plan-display{background:var(--bg2);border:1px solid var(--border-bright);border-radius:12px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.plan-display::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent)}
.plan-name-big{font-family:'Orbitron',monospace;font-size:24px;font-weight:700;color:var(--teal)}
.plan-price-big{font-size:36px;font-weight:300;margin:8px 0}
.plan-price-big span{font-size:16px;color:var(--text-dim)}
.plan-features-list{margin-top:16px;display:grid;gap:8px}
.plan-feature{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim)}
.plan-feature::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}

/* ── SEARCH ── */
.search-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.search-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--teal)}
.filter-select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}

/* ── RESPONSIVE ── */
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// ── AUTH ──
let currentUser = null;

// Build support email client-side to avoid Cloudflare obfuscation
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('support-link');
  if (el) {
    const e = ['support.converta', 'gmail.com'].join('@');
    el.textContent = e;
    el.href = 'mailto:' + e;
  }
});

// Simple hash for local auth check
async function hashPass(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Admin hash: SHA-256 of your chosen password
// To update: open browser console, run: crypto.subtle.digest('SHA-256', new TextEncoder().encode('yourpassword')).then(b=>console.log(Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')))
const ADMIN_HASH = 'b084d079609b7ad1b948c6968858e98677ad93a389b600b394a9100b5376b85f';

async function doLogin() {
  const email   = document.getElementById('login-email').value.trim().toLowerCase();
  const pass    = document.getElementById('login-pass').value;
  const btn     = document.querySelector('.login-btn');
  const errEl   = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!email || !pass) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = 'SIGNING IN...';
  btn.disabled = true;

  // Try Railway backend first
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 6000);
    const res = await fetch('https://web-production-46fe1e.up.railway.app/portal-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
      signal: controller.signal
    });
    clearTimeout(timeout);
    if (res.ok) {
      const data = await res.json();
      if (data.user) {
        currentUser = data.user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
        return;
      }
      if (res.status === 401) {
        errEl.textContent = 'Invalid email or password.';
        errEl.style.display = 'block';
        btn.textContent = 'SIGN IN →';
        btn.disabled = false;
        return;
      }
    }
  } catch(e) {
    // Backend unreachable — fall through to local check
    console.log('Backend unreachable, trying local auth');
  }

  // Local fallback: check against hashed admin password
  const inputHash = await hashPass(pass);
  const adminEmail = ['support.converta','gmail.com'].join('@');
  if (email === adminEmail && inputHash === ADMIN_HASH) {
    currentUser = { email, role: 'admin', name: 'Marcus', biz: 'Converta.AI', isFallback: true };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
    return;
  }

  errEl.textContent = 'Invalid email or password. Please try again.';
  errEl.style.display = 'block';
  btn.textContent = 'SIGN IN →';
  btn.disabled = false;
}

function logout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
}

function icon(path) {
  return `<svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${path}"/></svg>`;
}

function initApp() {
  // Set user info
  document.getElementById('user-avatar').textContent = currentUser.name.charAt(0);
  document.getElementById('user-name-display').textContent = currentUser.name;
  document.getElementById('user-role-display').textContent = currentUser.biz;
  document.getElementById('role-badge').textContent = '— ' + currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);

  // Build nav
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  const items = NAV[currentUser.role] || NAV.client;
  items.forEach(item => {
    if (item.section) {
      nav.innerHTML += `<div class="nav-section">${item.section}</div>`;
    } else {
      nav.innerHTML += `<div class="nav-item" id="nav-${item.id}" onclick="showPage('${item.id}')">${icon(item.icon)}<span>${item.label}</span></div>`;
    }
  });

  // Show first page
  const firstPage = items.find(i => i.id);
  if (firstPage) showPage(firstPage.id);
}

let activePage = null;
function showPage(id) {
  if (activePage === id) return;
  activePage = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');

  const pages = {
    'admin-dashboard': renderAdminDashboard,
    'admin-clients':   renderAdminClients,
    'admin-calls':     renderAdminCalls,
    'admin-billing':   renderAdminBilling,
    'client-dashboard':renderClientDashboard,
    'client-leads':    renderClientLeads,
    'client-calls':    renderClientCalls,
    'client-settings': renderClientSettings,
    'client-billing':  renderClientBilling,
  };
  const fn = pages[id];
  if (fn) document.getElementById('main-content').innerHTML = fn();
}

          <td>${c.transcript.length ? `<button onclick="openTranscript(${c.id})" style="background:var(--teal-dim);border:1px solid var(--border);color:var(--teal);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif">Transcript</button>` : '<span style="font-size:11px;color:var(--text-muted)">—</span>'}</td>

      </tbody>
    </table>
  </div>`;
}

function openTranscript(id) {
  const call = MOCK_CALLS.find(c => c.id === id);
  if (!call || !call.transcript.length) return;
  document.getElementById('modal-title').textContent = `Transcript — ${call.caller} · ${call.time}`;
  document.getElementById('modal-body').innerHTML = call.transcript.map(m => `
    <div class="msg ${m.r==='aria'?'aria-msg':''}">
      <div class="msg-role ${m.r}">${m.r === 'aria' ? 'Aria' : 'Caller'}</div>
      <div class="msg-text">${m.t}</div>
    </div>`).join('');
  document.getElementById('transcript-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('transcript-modal').classList.remove('open');
}
